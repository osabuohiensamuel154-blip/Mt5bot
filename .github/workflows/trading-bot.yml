name: Forex Trading Bot

on:
  schedule:
    # Runs at the top of every hour, 24/7
    # GitHub Actions only runs scheduled workflows from the DEFAULT BRANCH (main/master)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows you to trigger a manual run from the GitHub Actions tab at any time

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # 12 pairs × ~1s each + processing headroom

    steps:
      # ── 1. Get the code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT (REPO_TOKEN) so we can push the trade log back.
          # Falls back to the built-in GITHUB_TOKEN (read-only for pushes on some plans).
          token: ${{ secrets.REPO_TOKEN || secrets.GITHUB_TOKEN }}

      # ── 2. Python environment ────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Inject secrets into .env ──────────────────────────────
      - name: Create .env from GitHub Secrets
        run: |
          cat > .env <<EOF
          CAPITAL_API_KEY=${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_EMAIL=${{ secrets.CAPITAL_EMAIL }}
          CAPITAL_PASSWORD=${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_ENV=${{ secrets.CAPITAL_ENV }}
          SYMBOLS=${{ vars.SYMBOLS || 'EURUSD,GBPUSD,AUDUSD,NZDUSD,USDCAD,USDCHF,USDJPY,EURJPY,GBPJPY,XAUUSD,US100,US30' }}
          TIMEFRAME=${{ vars.TIMEFRAME || 'HOUR' }}
          RISK_PER_TRADE=${{ vars.RISK_PER_TRADE || '0.01' }}
          MAX_TRADES_PER_DAY=${{ vars.MAX_TRADES_PER_DAY || '0' }}
          DAILY_LOSS_LIMIT=${{ vars.DAILY_LOSS_LIMIT || '0.03' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      # ── 4. Run the bot (single pass) ─────────────────────────────
      - name: Run bot — single pass
        run: python main.py --once

      # ── 5. Persist the trade log back to the repo ────────────────
      - name: Commit updated trade log
        if: always()   # run even if the bot step failed
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@noreply.github.com"
          git add trades.csv 2>/dev/null || true
          git diff --staged --quiet && echo "No new trades to commit" || \
            git commit -m "chore: update trades.csv [skip ci]" && git push

      # ── 6. Upload logs as an artifact (last 30 days) ─────────────
      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: |
            bot.log
            trades.csv
          retention-days: 30
          if-no-files-found: ignore
